services:
  app:
    image: python:3.10-slim
    container_name: coinx
    working_dir: /app
    volumes:
      - ./:/app
    env_file:
      - .env
    command: sh -c "pip install -r requirements.txt && pip install -e . && gunicorn --workers 1 --bind 0.0.0.0:${WEB_PORT:-5500} coinx.web.wsgi:app"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always
    ports:
      - "${WEB_PORT:-5500}:${WEB_PORT:-5500}"

  mysql:
    image: mysql:8.0
    container_name: coinx-mysql
    profiles:
      - mysql
    ports:
      - "${DB_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-coinx_root_password}
      MYSQL_DATABASE: ${DB_NAME:-coinx}
      MYSQL_USER: ${DB_USER:-coinx}
      MYSQL_PASSWORD: ${DB_PASSWORD:-coinx_password}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-log-bin
      - --slow_query_log=ON
      - --log_queries_not_using_indexes=ON
      - --log_output=FILE
      - --slow_query_log_file=/var/lib/mysql/slow.log
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: always

  starrocks-fe:
    image: starrocks/fe-ubuntu:3.4.2
    container_name: coinx-starrocks-fe
    hostname: starrocks-fe
    profiles:
      - starrocks
    command: ["/opt/starrocks/fe/bin/start_fe.sh"]
    ports:
      - "${SR_FE_HTTP_PORT:-8030}:8030"
      - "${SR_FE_QUERY_PORT:-9030}:9030"
      - "9010:9010"
    environment:
      - FE_SERVERS=fe1:starrocks-fe:9010
      - HOST_IP=starrocks-fe
    volumes:
      - starrocks_fe_meta:/opt/starrocks/fe/meta
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8030/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: always
    networks:
      default:
        ipv4_address: 192.168.192.4

  starrocks-be:
    image: starrocks/be-ubuntu:3.4.2
    container_name: coinx-starrocks-be
    hostname: starrocks-be
    profiles:
      - starrocks
    command: ["/opt/starrocks/be/bin/start_be.sh"]
    depends_on:
      starrocks-fe:
        condition: service_healthy
    ports:
      - "${SR_BE_WEB_PORT:-8040}:8040"
      - "9060:9060"
      - "9050:9050"
    environment:
      - FE_SERVERS=fe1:starrocks-fe:9010
      - HOST_IP=starrocks-be
    volumes:
      - starrocks_be_storage:/opt/starrocks/be/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8040/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: always
    networks:
      default:
        ipv4_address: 192.168.192.5

networks:
  default:
    ipam:
      config:
        - subnet: 192.168.192.0/20

volumes:
  mysql_data: {}
  starrocks_fe_meta: {}
  starrocks_be_storage: {}
