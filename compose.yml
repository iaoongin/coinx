services:
  app:
    image: python:3.10-slim
    container_name: coinx
    working_dir: /app
    volumes:
      - ./:/app
    env_file:
      - .env
    command: sh -c "pip install -r requirements.txt && pip install -e . && gunicorn --workers 1 --bind 0.0.0.0:${WEB_PORT:-5500} coinx.web.wsgi:app"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always
    ports:
      - "${WEB_PORT:-5500}:${WEB_PORT:-5500}"

  mysql:
    image: mysql:8.0
    container_name: coinx-mysql
    profiles:
      - mysql
    ports:
      - "${DB_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-coinx_root_password}
      MYSQL_DATABASE: ${DB_NAME:-coinx}
      MYSQL_USER: ${DB_USER:-coinx}
      MYSQL_PASSWORD: ${DB_PASSWORD:-coinx_password}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-log-bin
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: always

volumes:
  mysql_data: {}
