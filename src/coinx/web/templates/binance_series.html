<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Binance 历史序列管理</title>
    <style>
      :root {
        --bg-a: #4f46e5;
        --bg-b: #0f766e;
        --panel: rgba(255, 255, 255, 0.94);
        --text: #1f2937;
        --muted: #6b7280;
        --line: #dbe4f0;
        --primary: #2563eb;
        --primary-hover: #1d4ed8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(255, 255, 255, 0.18), transparent 28%),
          linear-gradient(140deg, var(--bg-a), var(--bg-b));
        padding: 24px;
      }

      .shell {
        max-width: 1240px;
        margin: 0 auto;
        background: var(--panel);
        backdrop-filter: blur(8px);
        border-radius: 24px;
        padding: 28px;
        box-shadow: 0 18px 50px rgba(15, 23, 42, 0.22);
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 24px;
      }

      .title-block h1 {
        margin: 0 0 8px;
        font-size: 30px;
        color: #0f172a;
      }

      .title-block p {
        margin: 0;
        color: var(--muted);
        font-size: 14px;
      }

      .topbar-actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }

      .nav-btn,
      .action-btn,
      .secondary-btn {
        border: none;
        border-radius: 999px;
        padding: 11px 18px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        text-decoration: none;
        transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
      }

      .nav-btn {
        background: linear-gradient(135deg, #64748b, #475569);
        color: #fff;
      }

      .action-btn {
        background: linear-gradient(135deg, var(--primary), #3b82f6);
        color: #fff;
        box-shadow: 0 10px 20px rgba(37, 99, 235, 0.22);
      }

      .secondary-btn {
        border: 1px solid var(--line);
        background: #fff;
        color: #1e3a8a;
        font-size: 13px;
        font-weight: 700;
        padding: 9px 14px;
      }

      .nav-btn:hover,
      .action-btn:hover,
      .secondary-btn:hover {
        transform: translateY(-1px);
      }

      .action-btn:hover {
        background: linear-gradient(135deg, var(--primary-hover), var(--primary));
      }

      .secondary-btn:hover {
        border-color: #93c5fd;
        background: #eff6ff;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 20px;
      }

      .card {
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid rgba(219, 228, 240, 0.9);
        border-radius: 20px;
        padding: 22px;
        box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
      }

      .card h2 {
        margin: 0 0 10px;
        font-size: 20px;
      }

      .card p {
        margin: 0 0 18px;
        color: var(--muted);
        font-size: 14px;
      }

      .field-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .field.full {
        grid-column: 1 / -1;
      }

      label {
        font-size: 13px;
        font-weight: 700;
        color: #334155;
      }

      input,
      select,
      textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 11px 12px;
        font-size: 14px;
        color: var(--text);
        background: #fff;
      }

      textarea {
        min-height: 96px;
        resize: vertical;
      }

      input:focus,
      select:focus,
      textarea:focus {
        outline: none;
        border-color: #60a5fa;
        box-shadow: 0 0 0 4px rgba(96, 165, 250, 0.18);
      }

      .help {
        margin-top: 6px;
        color: var(--muted);
        font-size: 12px;
      }

      .inline-actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 10px;
      }

      .result-panel {
        margin-top: 24px;
        background: #0f172a;
        color: #e2e8f0;
        border-radius: 20px;
        padding: 20px;
      }

      .result-panel h3 {
        margin: 0 0 10px;
        font-size: 18px;
      }

      .result-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 14px;
      }

      .badge {
        padding: 6px 10px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
        background: rgba(255, 255, 255, 0.1);
      }

      .badge.success {
        background: rgba(22, 163, 74, 0.18);
        color: #86efac;
      }

      .badge.warning {
        background: rgba(234, 88, 12, 0.18);
        color: #fdba74;
      }

      .status-box {
        margin-bottom: 18px;
        padding: 12px 14px;
        border-radius: 14px;
        font-size: 14px;
      }

      .status-box.success {
        background: rgba(22, 163, 74, 0.12);
        color: #166534;
        border: 1px solid rgba(22, 163, 74, 0.24);
      }

      .status-box.error {
        background: rgba(220, 38, 38, 0.12);
        color: #991b1b;
        border: 1px solid rgba(220, 38, 38, 0.24);
      }

      pre {
        margin: 0;
        max-height: 360px;
        overflow: auto;
        white-space: pre-wrap;
        word-break: break-word;
        font-family: Consolas, "Courier New", monospace;
        font-size: 13px;
        line-height: 1.6;
      }

      @media (max-width: 960px) {
        .grid,
        .field-grid {
          grid-template-columns: 1fr;
        }

        .topbar {
          flex-direction: column;
          align-items: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="topbar">
        <div class="title-block">
          <h1>Binance 历史序列管理</h1>
          <p>交易对默认来自当前跟踪配置，类型、周期和 limit 默认来自后端配置。</p>
        </div>
        <div class="topbar-actions">
          <a class="nav-btn" href="/">返回首页</a>
          <a class="nav-btn" href="/coins-config">币种配置</a>
        </div>
      </div>

      <div id="statusBox"></div>

      <div class="grid">
        <section class="card">
          <h2>单条采集</h2>
          <p>按单个接口类型、交易对和周期触发一次采集。</p>
          <form id="singleForm">
            <div class="field-grid">
              <div class="field">
                <label for="singleSeriesType">序列类型</label>
                <select id="singleSeriesType" name="series_type"></select>
              </div>
              <div class="field">
                <label for="singleSymbol">交易对</label>
                <input id="singleSymbol" name="symbol" value="" placeholder="将自动填充第一个跟踪币种" />
              </div>
              <div class="field">
                <label for="singlePeriod">周期</label>
                <input id="singlePeriod" name="period" value="" />
              </div>
              <div class="field">
                <label for="singleLimit">抓取条数</label>
                <input id="singleLimit" name="limit" type="number" min="1" value="" />
              </div>
            </div>
            <p class="help">适合验证单个接口是否能正常抓取并入库。</p>
            <button class="action-btn" type="submit">执行单条采集</button>
          </form>
        </section>

        <section class="card">
          <h2>批量采集</h2>
          <p>一次触发多个交易对、多个周期、多个序列类型的组合采集。</p>
          <form id="batchForm">
            <div class="field-grid">
              <div class="field full">
                <label for="batchSymbols">交易对列表</label>
                <textarea id="batchSymbols"></textarea>
                <div class="help">默认会自动填充当前已跟踪币种，也可以手动编辑，使用英文逗号分隔。</div>
                <div class="inline-actions">
                  <button class="secondary-btn" type="button" id="fillTrackedSymbolsBtn">填充跟踪币种</button>
                </div>
              </div>
              <div class="field full">
                <label for="batchPeriods">周期列表</label>
                <textarea id="batchPeriods"></textarea>
                <div class="help">默认来自后端配置，也可以手动编辑。</div>
              </div>
              <div class="field full">
                <label for="batchSeriesTypes">序列类型列表</label>
                <textarea id="batchSeriesTypes"></textarea>
                <div class="help">默认来自后端配置，留空时接口层仍会按全部支持类型执行。</div>
              </div>
              <div class="field">
                <label for="batchLimit">抓取条数</label>
                <input id="batchLimit" type="number" min="1" value="" />
              </div>
            </div>
            <button class="action-btn" type="submit">执行批量采集</button>
          </form>
        </section>
      </div>

      <section class="result-panel">
        <h3>执行结果</h3>
        <div id="resultMeta" class="result-meta"></div>
        <pre id="resultOutput">尚未执行采集。</pre>
      </section>
    </div>

    <script>
      let trackedSymbols = [];
      let pageConfig = {
        enabled: false,
        interval: 300,
        limit: 30,
        periods: [],
        series_types: [],
      };

      function parseCsvText(text) {
        return text
          .split(",")
          .map((item) => item.trim())
          .filter(Boolean);
      }

      function showStatus(message, type) {
        const statusBox = document.getElementById("statusBox");
        statusBox.innerHTML = `<div class="status-box ${type}">${message}</div>`;
      }

      function renderResult(data, isBatch) {
        const resultMeta = document.getElementById("resultMeta");
        const resultOutput = document.getElementById("resultOutput");

        if (isBatch) {
          resultMeta.innerHTML = `
            <span class="badge success">成功 ${data.success_count}</span>
            <span class="badge warning">失败 ${data.failure_count}</span>
            <span class="badge">limit ${data.limit}</span>
          `;
        } else {
          resultMeta.innerHTML = `
            <span class="badge success">影响 ${data.affected}</span>
            <span class="badge">${data.series_type}</span>
            <span class="badge">${data.symbol}</span>
            <span class="badge">${data.period}</span>
          `;
        }

        resultOutput.textContent = JSON.stringify(data, null, 2);
      }

      function applyTrackedSymbols() {
        const batchSymbols = document.getElementById("batchSymbols");
        const singleSymbol = document.getElementById("singleSymbol");

        batchSymbols.value = trackedSymbols.join(",");
        if (!singleSymbol.value.trim() && trackedSymbols.length > 0) {
          singleSymbol.value = trackedSymbols[0];
        }
      }

      function applyPageConfig() {
        const singleSeriesType = document.getElementById("singleSeriesType");
        const singlePeriod = document.getElementById("singlePeriod");
        const singleLimit = document.getElementById("singleLimit");
        const batchPeriods = document.getElementById("batchPeriods");
        const batchSeriesTypes = document.getElementById("batchSeriesTypes");
        const batchLimit = document.getElementById("batchLimit");

        singleSeriesType.innerHTML = "";
        pageConfig.series_types.forEach((seriesType) => {
          const option = document.createElement("option");
          option.value = seriesType;
          option.textContent = seriesType;
          singleSeriesType.appendChild(option);
        });

        if (pageConfig.periods.length > 0) {
          singlePeriod.value = pageConfig.periods[0];
          batchPeriods.value = pageConfig.periods.join(",");
        }

        batchSeriesTypes.value = pageConfig.series_types.join(",");
        singleLimit.value = pageConfig.limit;
        batchLimit.value = pageConfig.limit;
      }

      async function loadTrackedSymbols() {
        const response = await fetch("/api/coins-config");
        const payload = await response.json();

        if (!response.ok || payload.status !== "success") {
          throw new Error(payload.message || "获取跟踪币种失败");
        }

        const coinsConfig = payload.data || {};
        trackedSymbols = Object.entries(coinsConfig)
          .filter(([, tracked]) => Boolean(tracked))
          .map(([symbol]) => symbol);

        applyTrackedSymbols();
        return trackedSymbols;
      }

      async function loadPageConfig() {
        const response = await fetch("/api/binance-series/config");
        const payload = await response.json();

        if (!response.ok || payload.status !== "success") {
          throw new Error(payload.message || "获取历史序列配置失败");
        }

        pageConfig = payload.data;
        applyPageConfig();
        return pageConfig;
      }

      async function postJson(url, body) {
        const response = await fetch(url, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify(body),
        });

        const payload = await response.json();
        if (!response.ok || payload.status !== "success") {
          throw new Error(payload.message || "请求失败");
        }
        return payload;
      }

      document.getElementById("fillTrackedSymbolsBtn").addEventListener("click", async () => {
        showStatus("正在加载已跟踪币种...", "success");
        try {
          await loadTrackedSymbols();
          if (trackedSymbols.length === 0) {
            showStatus("当前没有已跟踪币种，请先到币种配置页启用跟踪。", "error");
            return;
          }
          showStatus(`已填充 ${trackedSymbols.length} 个跟踪币种。`, "success");
        } catch (error) {
          showStatus(`加载跟踪币种失败: ${error.message}`, "error");
        }
      });

      document.getElementById("singleForm").addEventListener("submit", async (event) => {
        event.preventDefault();
        const body = {
          series_type: document.getElementById("singleSeriesType").value,
          symbol: document.getElementById("singleSymbol").value.trim(),
          period: document.getElementById("singlePeriod").value.trim(),
          limit: Number(document.getElementById("singleLimit").value),
        };

        showStatus("正在执行单条采集，请稍候...", "success");
        try {
          const payload = await postJson("/api/binance-series/collect", body);
          showStatus("单条采集成功。", "success");
          renderResult(payload.data, false);
        } catch (error) {
          showStatus(`单条采集失败: ${error.message}`, "error");
        }
      });

      document.getElementById("batchForm").addEventListener("submit", async (event) => {
        event.preventDefault();
        const rawSeriesTypes = parseCsvText(document.getElementById("batchSeriesTypes").value.trim());
        const body = {
          symbols: parseCsvText(document.getElementById("batchSymbols").value),
          periods: parseCsvText(document.getElementById("batchPeriods").value),
          limit: Number(document.getElementById("batchLimit").value),
        };

        if (rawSeriesTypes.length > 0) {
          body.series_types = rawSeriesTypes;
        }

        showStatus("正在执行批量采集，请稍候...", "success");
        try {
          const payload = await postJson("/api/binance-series/batch-collect", body);
          showStatus("批量采集成功。", "success");
          renderResult(payload.data, true);
        } catch (error) {
          showStatus(`批量采集失败: ${error.message}`, "error");
        }
      });

      window.addEventListener("DOMContentLoaded", async () => {
        try {
          await Promise.all([loadPageConfig(), loadTrackedSymbols()]);

          if (trackedSymbols.length > 0) {
            showStatus(
              `已加载配置：types=${pageConfig.series_types.length}，periods=${pageConfig.periods.length}，tracked=${trackedSymbols.length}。`,
              "success"
            );
          } else {
            showStatus("已加载配置，但当前没有已跟踪币种，请先到币种配置页启用跟踪。", "error");
          }
        } catch (error) {
          showStatus(`初始化页面失败: ${error.message}`, "error");
        }
      });
    </script>
  </body>
</html>
