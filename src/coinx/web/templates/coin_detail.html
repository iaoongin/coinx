<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>币种详情</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/element-plus/dist/index.full.js"></script>
    <style>
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: var(--page-padding);
            background: var(--page-bg-gradient);
            font-size: 14px;
            color: #333;
        }
        #app { max-width: var(--page-max-width); margin: 0 auto; }
        .container { background-color: var(--page-surface-bg); padding: var(--page-surface-padding); border-radius: var(--page-surface-radius); box-shadow: var(--page-surface-shadow); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 2px solid #ecf0f1; }
        .header h1 { margin: 0; color: #2c3e50; font-size: 28px; font-weight: 600; }
        .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .info-card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08); border: 1px solid #e5e7eb; }
        .info-card h3 { margin: 0 0 15px; color: #2c3e50; font-size: 18px; font-weight: 600; border-bottom: 2px solid #ecf0f1; padding-bottom: 10px; }
        .price-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .price-info span:first-child { color: #6b7280; }
        .price-value { font-size: 24px; font-weight: bold; color: #2c3e50; }
        .funding-rate { font-size: 18px; font-weight: bold; color: #e74c3c; }
        .positive { color: #27ae60; }
        .negative { color: #e74c3c; }
        .total-oi { text-align: center; font-size: 20px; font-weight: bold; color: #2c3e50; margin-bottom: 20px; }
        .oi-changes { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 10px; }
        .oi-item { text-align: center; padding: 10px; background: #f8f9fa; border-radius: 8px; border: 1px solid #e5e7eb; }
        .oi-label { font-size: 12px; color: #7f8c8d; margin-bottom: 5px; }
        .oi-value { font-size: 14px; font-weight: 600; }
        .exchange-list { list-style: none; padding: 0; margin: 0; }
        .exchange-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f3f4f6; }
        .exchange-item:last-child { border-bottom: none; }
        .exchange-name { font-weight: 600; color: #2c3e50; }
        .exchange-value { font-weight: 600; color: #3498db; }
        .exchange-percentage { font-size: 12px; color: #7f8c8d; margin-left: 5px; }
        .time-series { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; }
        .time-item { text-align: center; padding: 10px; background: #f8f9fa; border-radius: 8px; border: 1px solid #e5e7eb; }
        .time-label { font-size: 12px; color: #7f8c8d; margin-bottom: 5px; }
        .time-value { font-size: 14px; font-weight: 600; }
    </style>
</head>
<body>
  <div id="app">
    {% include 'components/nav.html' %}
    
    <div class="container">
        <div class="header">
            <h1>{{ symbol }} 合约详情</h1>
            <el-button type="primary" @click="goBack">返回</el-button>
        </div>

        <el-empty v-if="loading" description="正在加载数据..."></el-empty>
        <el-alert v-else-if="error" :title="error" type="error" :closable="false"></el-alert>

        <template v-else-if="data">
            {% raw %}
            <div class="info-grid">
                <div class="info-card">
                    <h3>基础信息</h3>
                    <div class="price-info">
                        <span>最近交易价</span>
                        <span class="price-value">{{ formatPrice(data.latest_price) }}</span>
                    </div>
                    <div class="price-info">
                        <span>资金费率</span>
                        <span class="funding-rate">{{ formatFundingRate() }}</span>
                    </div>
                    <div class="price-info" v-if="data.ticker_data">
                        <span>24h涨跌</span>
                        <span :class="data.ticker_data.priceChangePercent >= 0 ? 'positive' : 'negative'">
                            {{ formatPercentage(data.ticker_data.priceChangePercent) }}
                        </span>
                    </div>
                </div>

                <div class="info-card">
                    <h3>持仓信息</h3>
                    <div class="total-oi" v-if="data.open_interest_data">
                        总持仓: {{ formatNumber(data.open_interest_data.openInterestValue) }}
                    </div>
                    <div class="oi-changes">
                        <div class="oi-item" v-for="interval in intervals" :key="interval">
                            <div class="oi-label">{{ interval }}</div>
                            <div class="oi-value">{{ formatNumber(data.open_interest_data?.openInterestValue || 0) }}</div>
                            <div class="oi-percentage">{{ getIntervalChange(interval) }}</div>
                        </div>
                    </div>
                </div>

                <div class="info-card">
                    <h3>交易所持仓分布</h3>
                    <ul class="exchange-list">
                        <li class="exchange-item" v-for="(info, exchange) in data.exchange_distribution" :key="exchange">
                            <span class="exchange-name">{{ formatExchangeName(exchange) }}</span>
                            <span class="exchange-value">
                                {{ formatNumber(info.value) }}
                                <span class="exchange-percentage">({{ info.percentage }}%)</span>
                            </span>
                        </li>
                    </ul>
                </div>

                <div class="info-card">
                    <h3>主力净流入</h3>
                    <div class="time-series">
                        <div class="time-item" v-for="(value, time) in data.net_inflow_data" :key="time">
                            <div class="time-label">{{ time }}</div>
                            <div class="time-value" :class="value >= 0 ? 'positive' : 'negative'">
                                {{ formatNumber(value) }}
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            {% endraw %}
        </template>
    </div>
  </div>

  <script>
      const { createApp, ref, reactive, computed, onMounted } = Vue;

      const App = {
          setup() {
              const symbol = ref('');
              const data = ref(null);
              const loading = ref(true);
              const error = ref('');
              const intervals = ['5分钟', '15分钟', '30分钟', '1小时', '4小时', '8小时', '12小时', '24小时', '72小时', '168小时'];
              
              const activeMenu = computed(() => '/coin-detail');
              const intervalChanges = {
                  '5分钟': '+0.26%', '15分钟': '+0.13%', '30分钟': '-0.20%',
                  '1小时': '-2.28%', '4小时': '-4.96%', '8小时': '-1.36%',
                  '12小时': '-3.41%', '24小时': '+26.82%', '72小时': '+57.17%', '168小时': '+147.93%'
              };

              const getSymbolFromUrl = () => {
                  const urlParams = new URLSearchParams(window.location.search);
                  return urlParams.get('symbol') || 'SPKUSDT';
              };

              const formatNumber = (num) => {
                  if (num === null || num === undefined) return 'N/A';
                  const absNum = Math.abs(num);
                  if (absNum >= 1e9) return (num / 1e9).toFixed(2) + 'B';
                  if (absNum >= 1e6) return (num / 1e6).toFixed(2) + 'M';
                  if (absNum >= 1e3) return (num / 1e3).toFixed(2) + 'K';
                  return num.toFixed(2);
              };

              const formatPrice = (price) => {
                  if (price === null || price === undefined) return 'N/A';
                  return '$' + price.toFixed(8);
              };

              const formatPercentage = (percent) => {
                  if (percent === null || percent === undefined) return 'N/A';
                  return (percent > 0 ? '+' : '') + percent.toFixed(2) + '%';
              };

              const formatFundingRate = () => {
                  if (!data.value?.funding_rate) return 'N/A';
                  return formatPercentage(data.value.funding_rate.lastFundingRate * 100);
              };

              const formatExchangeName = (exchange) => {
                  return exchange.charAt(0).toUpperCase() + exchange.slice(1);
              };

              const getIntervalChange = (interval) => {
                  return intervalChanges[interval] || 'N/A';
              };

              const goBack = () => {
                  window.history.back();
              };

              const loadData = async () => {
                  symbol.value = getSymbolFromUrl();
                  loading.value = true;
                  error.value = '';
                  
                  try {
                      const response = await fetch(`/api/coin-detail/${symbol.value}`);
                      const result = await response.json();
                      if (result.status === 'success') {
                          data.value = result.data;
                      } else {
                          error.value = result.message;
                      }
                  } catch (err) {
                      error.value = '加载数据失败: ' + err.message;
                  } finally {
                      loading.value = false;
                  }
              };

              onMounted(() => {
                  loadData();
              });

              const handleMenuSelect = (index) => {
                window.location.href = index;
              };

              return {
                  symbol,
                  data,
                  loading,
                  error,
                  intervals,
                  activeMenu,
                  handleMenuSelect,
                  formatNumber,
                  formatPrice,
                  formatPercentage,
                  formatFundingRate,
                  formatExchangeName,
                  getIntervalChange,
                  goBack
              };
          }
      };

      const app = createApp(App);
      app.use(ElementPlus);
      app.mount('#app');
  </script>
</body>
</html>
