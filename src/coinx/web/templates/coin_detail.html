<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>合约详情 - CoinX</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='dark-theme.css') }}">
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='brand/coinx-mark.svg') }}">
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://unpkg.com/echarts@6.0.0/dist/echarts.min.js"></script>
  <style>
    body { margin: 0; padding: var(--page-padding); background: var(--bg-primary); color: var(--text-primary); }
    * { box-sizing: border-box; }
    #app { max-width: var(--page-max-width); margin: 0 auto; }
    .detail-shell { padding: 16px 0 28px; }
    .detail-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 14px; }
    .title-row { display: flex; align-items: center; flex-wrap: wrap; gap: 10px; }
    .symbol-picker { position: relative; }
    .symbol-picker-input { width: 100%; height: 36px; padding: 7px 11px; border: 1px solid var(--border-default); border-radius: 4px; background: var(--bg-card); color: var(--text-primary); font: 13px var(--font-mono); outline: none; }
    .symbol-picker-input:focus { border-color: var(--gold-primary); }
    .symbol-picker-toggle { position: relative; width: 30px; height: 30px; padding: 0; border: 1px solid var(--border-default); border-radius: 4px; background: var(--bg-card); color: var(--text-secondary); cursor: pointer; }
    .symbol-picker-toggle::after { content: ''; position: absolute; top: 10px; left: 10px; width: 8px; height: 8px; border-right: 2px solid currentColor; border-bottom: 2px solid currentColor; transform: rotate(45deg); }
    .symbol-picker-toggle:hover { color: var(--gold-primary); border-color: var(--gold-primary); }
    .symbol-picker-menu { position: absolute; z-index: 10; top: calc(100% + 6px); left: 0; width: 280px; max-height: 320px; overflow-y: auto; padding: 5px; border: 1px solid var(--border-default); border-radius: 6px; background: var(--bg-elevated); box-shadow: var(--shadow-card); }
    .symbol-picker-label { padding: 6px 7px 4px; color: var(--text-muted); font-size: 11px; }
    .symbol-picker-option { display: block; width: 100%; padding: 8px 7px; border: 0; border-radius: 4px; background: transparent; color: var(--text-primary); text-align: left; font: 13px var(--font-mono); cursor: pointer; }
    .symbol-picker-option:hover, .symbol-picker-option.active { background: var(--bg-hover); color: var(--gold-primary); }
    .symbol-picker-empty { padding: 10px 7px; color: var(--text-muted); font-size: 12px; }
    h1 { margin: 0; font-size: 24px; letter-spacing: 0; }
    .symbol { color: var(--gold-primary); font-family: var(--font-mono); }
    .status { padding: 3px 8px; border: 1px solid var(--border-default); border-radius: 4px; font-size: 12px; color: var(--text-secondary); }
    .status.complete { color: var(--positive); border-color: rgba(74, 222, 128, .35); }
    .status.partial { color: var(--gold-primary); border-color: rgba(251, 191, 36, .35); }
    .updated { margin-top: 7px; font-size: 12px; color: var(--text-muted); }
    .actions { display: flex; gap: 8px; }
    .btn { min-height: 36px; padding: 7px 13px; border: 1px solid var(--border-default); border-radius: 6px; background: var(--bg-elevated); color: var(--text-primary); cursor: pointer; }
    .btn:disabled { opacity: .5; cursor: default; }
    .notice { padding: 12px 14px; margin-bottom: 16px; border: 1px solid rgba(251, 191, 36, .3); background: rgba(251, 191, 36, .07); color: var(--gold-primary); border-radius: 6px; font-size: 13px; }
    .state { min-height: 240px; display: grid; place-items: center; color: var(--text-muted); }
    .error { color: var(--negative); text-align: center; }
    .error .btn { margin-top: 14px; }
    .overview-layout { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; margin-bottom: 14px; }
    .section-heading { display: flex; align-items: baseline; justify-content: space-between; gap: 10px; margin-bottom: 10px; }
    .section-heading h2, .overview-heading { margin: 0; font-size: 16px; letter-spacing: 0; }
    .section-heading-actions { display: flex; align-items: center; gap: 8px; }
    .section-updated { flex: 0 0 auto; color: var(--text-muted); font-size: 12px; white-space: nowrap; }
    .section-refresh { min-height: 28px; padding: 4px 8px; font-size: 12px; }
    .overview-panel .summary-grid { margin-bottom: 0; grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .overview-panel .exchange-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .summary-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; margin-bottom: 14px; }
    .metric { min-height: 96px; padding: 12px; border: 1px solid var(--border-default); background: var(--bg-card); border-radius: 6px; }
    .metric-label { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }
    .metric-value { font: 600 20px var(--font-mono); overflow-wrap: anywhere; }
    .metric-sub { margin-top: 6px; font-size: 12px; color: var(--text-secondary); }
    .positive { color: var(--positive); }
    .negative { color: var(--negative); }
    .change-value { font: 600 13px var(--font-mono); }
    .change-percent { margin-top: 4px; color: inherit; font-size: 12px; }
    .section { margin-top: 14px; border-top: 1px solid var(--border-default); padding-top: 14px; }
    .section h2 { margin: 0 0 10px; font-size: 16px; letter-spacing: 0; }
    .table-wrap { max-width: 100%; overflow-x: auto; border: 1px solid var(--border-default); border-radius: 6px; }
    table { width: 100%; border-collapse: collapse; min-width: 760px; }
    th, td { padding: 6px 10px; border-bottom: 1px solid var(--border-subtle); text-align: right; font-size: 12px; line-height: 1.25; white-space: nowrap; }
    th { color: var(--text-muted); font-weight: 500; background: var(--bg-secondary); }
    th:first-child, td:first-child { text-align: left; }
    tbody tr:last-child td { border-bottom: 0; }
    .period-matrix-wrap { overflow-x: auto; border: 1px solid var(--border-default); border-radius: 6px; }
    .period-matrix { min-width: 648px; display: grid; grid-template-columns: 72px repeat(7, minmax(80px, 1fr)); border-top: 1px solid rgba(212, 175, 55, .28); }
    .period-cell { min-height: 30px; display: flex; align-items: center; justify-content: center; padding: 4px 6px; border-right: 1px solid var(--border-subtle); border-bottom: 1px solid var(--border-subtle); font-size: 12px; }
    .period-cell:nth-child(8n) { border-right: 0; }
    .period-head { min-height: 30px; background: linear-gradient(180deg, rgba(212, 175, 55, .16), rgba(212, 175, 55, .06)), var(--bg-elevated); color: var(--gold-bright); font-size: 11px; font-weight: 700; letter-spacing: .04em; border-bottom-color: rgba(212, 175, 55, .26); }
    .period-window { justify-content: flex-start; color: var(--text-secondary); font-family: var(--font-mono); font-weight: 700; background: rgba(255, 255, 255, .015); }
    .period-metric { min-width: 0; font-family: var(--font-mono); font-weight: 700; line-height: 1.15; }
    .period-metric.positive { background: rgba(34, 197, 94, .08); }
    .period-metric.negative { background: rgba(239, 68, 68, .08); }
    .period-raw { font-family: var(--font-mono); color: var(--text-primary); }
    .exchange-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; }
    .exchange { padding: 12px; border: 1px solid var(--border-default); background: var(--bg-card); border-radius: 6px; }
    .exchange-head { display: flex; justify-content: space-between; margin-bottom: 8px; }
    .exchange-name { font-weight: 600; text-transform: capitalize; }
    .exchange-share { color: var(--gold-primary); font-family: var(--font-mono); }
    .exchange-value { color: var(--text-secondary); font-family: var(--font-mono); font-size: 13px; }
    .exchange-sub { display: flex; justify-content: space-between; gap: 8px; }
    .exchange-warning { color: var(--gold-primary); }
    .empty { padding: 28px; text-align: center; color: var(--text-muted); border: 1px dashed var(--border-default); border-radius: 6px; }
    .range-bar { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 10px; }
    .segments { display: flex; border: 1px solid var(--border-default); border-radius: 6px; overflow: hidden; }
    .segment { width: 48px; height: 30px; border: 0; border-right: 1px solid var(--border-default); background: var(--bg-card); color: var(--text-secondary); cursor: pointer; }
    .segment:last-child { border-right: 0; }.segment.active { color: var(--gold-primary); background: var(--bg-elevated); }
    .charts { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    .chart-panel { border: 1px solid var(--border-default); background: var(--bg-card); border-radius: 6px; padding: 10px; min-width: 0; }
    .chart-title { font-size: 13px; font-weight: 600; margin-bottom: 6px; }
    .chart { height: 360px; width: 100%; }.chart-state { height: 360px; display: grid; place-items: center; color: var(--text-muted); font-size: 13px; }
    .score-layout { display: grid; grid-template-columns: 230px 1fr; gap: 12px; }
    .score-layout > div { min-width: 0; }
    .score-summary { border: 1px solid var(--border-default); background: var(--bg-card); border-radius: 6px; padding: 16px; }
    .score-total { font: 700 34px var(--font-mono); color: var(--gold-primary); }.score-signal { margin: 6px 0; font-weight: 600; }.score-advice { font-size: 12px; color: var(--text-secondary); line-height: 1.5; }
    .score-components { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 8px; margin-top: 14px; }
    .score-component { padding: 10px; background: var(--bg-secondary); border-radius: 5px; }.score-component span { display: block; color: var(--text-muted); font-size: 11px; }.score-component strong { display: block; margin-top: 5px; font-family: var(--font-mono); }
    @media (max-width: 900px) { .overview-layout { grid-template-columns: 1fr; } .summary-grid, .exchange-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } .charts { grid-template-columns: 1fr; }.score-layout { grid-template-columns: 1fr; }.score-components { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 768px) {
      .detail-shell { padding: 12px 0 20px; }
      .nav-container { scrollbar-width: none; }
      .nav-container::-webkit-scrollbar { display: none; }
      .detail-header { align-items: stretch; flex-direction: column; gap: 10px; margin-bottom: 12px; }
      .title-row { gap: 8px; }
      h1 { font-size: 20px; overflow-wrap: anywhere; }
      .symbol-picker-menu { left: 50%; right: auto; width: min(320px, calc(100vw - 32px)); max-width: none; transform: translateX(-50%); }
      .updated { margin-top: 5px; }
      .actions { display: flex; width: 100%; }
      .actions .btn { flex: 1; min-height: 40px; }
      .notice { padding: 10px 12px; margin-bottom: 12px; }
      .overview-layout { gap: 12px; margin-bottom: 12px; }
      .summary-grid, .exchange-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; }
      .metric, .exchange { min-height: 84px; padding: 10px; }
      .metric-label { margin-bottom: 6px; }
      .metric-value { font-size: 17px; }
      .metric-sub { margin-top: 4px; }
      .section { margin-top: 12px; padding-top: 12px; }
      .section-heading-actions { gap: 6px; }
      .section-updated { overflow: hidden; text-overflow: ellipsis; }
      .range-bar { align-items: stretch; flex-direction: column; gap: 8px; }
      .segments { width: 100%; }
      .segment { flex: 1; min-width: 0; }
      .charts { gap: 10px; }
      .chart-panel { padding: 8px; }
      .chart, .chart-state { height: 260px; }
      .score-summary { padding: 12px; }
      .score-components { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 6px; margin-top: 10px; }
      .score-component { padding: 8px; }
    }
  </style>
</head>
<body>
  <div id="app">
    {% include 'components/nav.html' %}
    <main class="detail-shell">
      <header class="detail-header">
        <div>
          <div class="title-row">
            <h1><span class="symbol">[[ symbol || '合约' ]]</span> 合约详情</h1>
            <div class="symbol-picker" @focusout="closeSymbolMenu">
              <button class="symbol-picker-toggle" type="button" aria-label="搜索并切换合约" @mousedown.prevent @click="toggleSymbolMenu"></button>
              <div v-if="showSymbolMenu" class="symbol-picker-menu">
                <input ref="symbolSearchEl" class="symbol-picker-input" type="search" v-model="symbolQuery" placeholder="搜索合约，例如 BTCUSDT" aria-label="搜索合约" @keydown.enter.prevent="selectFirstSymbol" @keydown.escape="showSymbolMenu = false">
                <template v-if="!symbolQuery && recentSymbols.length">
                  <div class="symbol-picker-label">最近浏览</div>
                  <button v-for="item in recentSymbols" :key="`recent-${item}`" class="symbol-picker-option" :class="{ active: item === symbol }" type="button" @mousedown.prevent @click="switchSymbol(item)">[[ item ]]</button>
                </template>
                <template v-if="filteredSymbols.length">
                  <div class="symbol-picker-label">[[ symbolQuery ? '搜索结果' : '全部合约' ]]</div>
                  <button v-for="item in filteredSymbols" :key="item" class="symbol-picker-option" :class="{ active: item === symbol }" type="button" @mousedown.prevent @click="switchSymbol(item)">[[ item ]]</button>
                </template>
                <div v-else-if="symbolQuery" class="symbol-picker-empty">未找到匹配的合约</div>
                <div v-else-if="!recentSymbols.length" class="symbol-picker-empty">正在加载可用合约</div>
              </div>
            </div>
          </div>
          <div v-if="detail" class="updated">数据时间：[[ formatTime(detail.as_of) ]]</div>
        </div>
        <div class="actions">
          <button class="btn" type="button" @click="goBack">返回</button>
        </div>
      </header>

      <div v-if="selectionRequired" class="state"><div>请选择合约</div></div>
      <div v-else-if="error && !detail" class="state error"><div><div>[[ error ]]</div><button class="btn" @click="loadData">重试</button></div></div>
      <template v-else>
        <div v-if="detail && detail.data_status !== 'complete'" class="notice">
          当前合约状态：[[ statusText ]]<span v-if="missingExchangeDetails">，缺少：[[ missingExchangeDetails ]]</span>。页面已保留可用数据。
        </div>
        <div v-if="error" class="notice">刷新失败，当前仍显示上一次数据：[[ error ]]</div>

        <div class="overview-layout">
          <section class="overview-panel">
            <div class="section-heading"><h2 class="overview-heading">基础信息</h2><div class="section-heading-actions"><span v-if="detail" class="section-updated">数据时间：[[ formatTime(detail.as_of) ]]</span><button class="btn section-refresh" type="button" @click="loadData" :disabled="loading">[[ loading ? '加载中' : '刷新' ]]</button></div></div>
            <section v-if="detail" class="summary-grid" aria-label="核心摘要">
          <article class="metric"><div class="metric-label">最新价格</div><div class="metric-value">[[ formatPrice(summary.latest_price) ]]</div><div class="metric-sub" :class="tone(summary.price_change_24h_percent)">24h [[ formatPercent(summary.price_change_24h_percent) ]]</div></article>
          <article class="metric"><div class="metric-label">总持仓价值</div><div class="metric-value">[[ formatCompact(summary.open_interest_value, '$') ]]</div><div class="metric-sub">持仓量 [[ formatCompact(summary.open_interest) ]]</div></article>
          <article class="metric"><div class="metric-label">资金费率</div><div class="metric-value" :class="tone(summary.funding_rate)">[[ formatRate(summary.funding_rate) ]]</div><div class="metric-sub">预测 [[ formatRate(summary.predicted_funding_rate) ]]</div></article>
          <article class="metric"><div class="metric-label">市场结构评分</div><div class="metric-value">[[ scoreValue ]]</div><div class="metric-sub">[[ scoreDescription ]]</div></article>
            </section>
            <section v-else class="summary-grid" aria-label="核心摘要加载中">
          <article class="metric" v-for="label in ['最新价格', '总持仓价值', '资金费率', '市场结构评分']" :key="label"><div class="metric-label">[[ label ]]</div><div class="metric-sub">正在加载摘要...</div></article>
            </section>
          </section>

          <section class="overview-panel">
          <div class="section-heading"><h2 class="overview-heading">交易所持仓分布</h2><div class="section-heading-actions"><span v-if="detail" class="section-updated">数据时间：[[ formatTime(detail.as_of) ]]</span><button class="btn section-refresh" type="button" @click="loadData" :disabled="loading">[[ loading ? '加载中' : '刷新' ]]</button></div></div>
          <div v-if="detail">
          <div v-if="detail.exchange_distribution.length" class="exchange-grid">
            <article class="exchange" v-for="item in detail.exchange_distribution" :key="item.exchange"><div class="exchange-head"><span class="exchange-name">[[ item.exchange ]]</span><span class="exchange-share">[[ item.snapshot_share_percent == null ? (item.status === 'unsupported' ? '不支持' : 'N/A') : formatPercent(item.snapshot_share_percent, false) ]]</span></div><div class="exchange-value">[[ formatCompact(item.open_interest_value, '$') ]]</div><div class="metric-sub exchange-sub"><span>持仓量 [[ formatCompact(item.open_interest) ]]</span><span v-if="item.status === 'excluded'" class="exchange-warning">多周期未纳入</span></div></article>
          </div>
          <div v-else class="empty">暂无交易所持仓分布</div>
          </div>
          <div v-else class="empty">正在加载交易所数据...</div>
          </section>
        </div>

        <section class="section">
          <div class="section-heading"><h2>市场结构评分</h2><div class="section-heading-actions"><span v-if="structureScoreAsOf" class="section-updated">数据时间：[[ formatTime(structureScoreAsOf) ]]</span><button class="btn section-refresh" type="button" @click="loadStructureScore" :disabled="scoreLoading">[[ scoreLoading ? '加载中' : '刷新' ]]</button></div></div>
          <div v-if="scoreLoading" class="empty">正在计算结构评分...</div>
          <div v-else-if="scoreError" class="notice">[[ scoreError ]] <button class="btn" @click="loadStructureScore">重试</button></div>
          <div v-else-if="structureScore" class="score-layout">
            <div class="score-summary"><div class="score-total">[[ scoreValue ]]</div><div class="score-signal">[[ structureScore.trade_signal || 'N/A' ]] · 风险[[ structureScore.risk_level || 'N/A' ]]</div><div class="score-advice">[[ scoreDescription ]]</div></div>
            <div>
              <div class="score-components"><div class="score-component" v-for="item in scoreComponents" :key="item.key"><span>[[ item.label ]]</span><strong :class="tone(item.value)">[[ formatScore(item.value) ]]</strong><span>[[ item.description ]]</span></div></div>
              <div class="table-wrap" style="margin-top:10px" v-if="structureScore.exchange_scores?.length"><table><thead><tr><th>交易所</th><th>权重</th><th>总分</th><th>加权分</th><th>趋势</th><th>动量</th><th>仓位</th></tr></thead><tbody><tr v-for="row in structureScore.exchange_scores" :key="row.exchange"><td>[[ row.exchange ]]</td><td>[[ formatPercent((row.weight || 0) * 100, false) ]]</td><td :class="tone(row.total_score)">[[ formatScore(row.total_score) ]]</td><td>[[ formatScore(row.weighted_total_score) ]]</td><td>[[ row.trend_direction || 'N/A' ]]</td><td>[[ row.momentum_direction || 'N/A' ]]</td><td>[[ row.position_structure || 'N/A' ]]</td></tr></tbody></table></div>
            </div>
          </div>
          <div v-else class="empty">暂无结构评分</div>
        </section>

        <section class="section">
          <div class="range-bar"><div class="section-heading"><h2>历史趋势</h2><div class="section-heading-actions"><span v-if="series.anchor_time" class="section-updated">数据时间：[[ formatTime(series.anchor_time) ]]</span><button class="btn section-refresh" type="button" @click="loadSeries" :disabled="seriesLoading">[[ seriesLoading ? '加载中' : '刷新' ]]</button></div></div><div class="segments"><button v-for="item in ranges" :key="item" class="segment" :class="{ active: selectedRange === item }" @click="changeRange(item)">[[ item ]]</button></div></div>
          <div v-if="seriesError" class="notice">[[ seriesError ]]</div>
          <div class="charts">
            <div class="chart-panel"><div class="chart-title">价格</div><div v-show="!seriesLoading && hasMarketSeries" ref="priceChartEl" class="chart"></div><div v-if="seriesLoading || !hasMarketSeries" class="chart-state">[[ seriesLoading ? '加载趋势数据...' : '暂无价格历史' ]]</div></div>
            <div class="chart-panel"><div class="chart-title">持仓价值</div><div v-show="!seriesLoading && hasMarketSeries" ref="openInterestChartEl" class="chart"></div><div v-if="seriesLoading || !hasMarketSeries" class="chart-state">[[ seriesLoading ? '加载趋势数据...' : '暂无持仓价值历史' ]]</div></div>
            <div class="chart-panel"><div class="chart-title">主动买卖与净流入</div><div v-show="!seriesLoading && hasFlowSeries" ref="flowChartEl" class="chart"></div><div v-if="seriesLoading || !hasFlowSeries" class="chart-state">[[ seriesLoading ? '加载趋势数据...' : '暂无主动买卖历史' ]]</div></div>
            <div class="chart-panel"><div class="chart-title">资金费率</div><div v-show="!seriesLoading && hasFundingSeries" ref="fundingChartEl" class="chart"></div><div v-if="seriesLoading || !hasFundingSeries" class="chart-state">[[ seriesLoading ? '加载趋势数据...' : '暂无资金费率历史' ]]</div></div>
          </div>
        </section>

        <section v-if="detail" class="section">
          <div class="section-heading"><h2>多周期变化</h2><div class="section-heading-actions"><span class="section-updated">数据时间：[[ formatTime(detail.as_of) ]]</span><button class="btn section-refresh" type="button" @click="loadData" :disabled="loading">[[ loading ? '加载中' : '刷新' ]]</button></div></div>
          <div class="period-matrix-wrap"><div class="period-matrix">
            <div class="period-cell period-head period-window">窗口</div>
            <div class="period-cell period-head">净流入</div>
            <div class="period-cell period-head">价格</div>
            <div class="period-cell period-head">价格%</div>
            <div class="period-cell period-head">量</div>
            <div class="period-cell period-head">量%</div>
            <div class="period-cell period-head">价值</div>
            <div class="period-cell period-head">价值%</div>
            <template v-for="row in detail.intervals" :key="row.interval">
              <div class="period-cell period-window">[[ row.interval ]]</div>
              <div class="period-cell period-metric" :class="tone(row.net_inflow_value ?? row.net_inflow)">[[ row.net_inflow_value_formatted || formatSignedCompact(row.net_inflow_value ?? row.net_inflow, '$') ]]</div>
              <div class="period-cell period-raw">[[ row.current_price_formatted || 'N/A' ]]</div>
              <div class="period-cell period-metric" :class="tone(row.price_change_percent)">[[ formatPercent(row.price_change_percent) ]]</div>
              <div class="period-cell period-raw">[[ row.open_interest_formatted || 'N/A' ]]</div>
              <div class="period-cell period-metric" :class="tone(row.open_interest_change_percent)">[[ formatPercent(row.open_interest_change_percent) ]]</div>
              <div class="period-cell period-raw">[[ row.open_interest_value_formatted || 'N/A' ]]</div>
              <div class="period-cell period-metric" :class="tone(row.open_interest_value_change_percent)">[[ formatPercent(row.open_interest_value_change_percent) ]]</div>
            </template>
          </div></div>
        </section>
        <section v-else class="section"><div class="section-heading"><h2>多周期变化</h2></div><div class="empty">正在加载多周期数据...</div></section>

      </template>
    </main>
  </div>
  <script>
    const { createApp, ref, computed, nextTick, onMounted, onBeforeUnmount } = Vue;
    createApp({
      delimiters: ['[[', ']]'],
      setup() {
        const symbol = ref(''); const detail = ref(null); const loading = ref(false); const error = ref(''); const selectionRequired = ref(false);
        const symbolQuery = ref(''); const symbolOptions = ref([]); const recentSymbols = ref([]); const showSymbolMenu = ref(false);
        const structureScore = ref(null); const structureScoreAsOf = ref(null); const scoreLoading = ref(false); const scoreError = ref('');
        const ranges = ['1h', '4h', '24h', '72h', '7d']; const selectedRange = ref('24h'); const series = ref({ market: [], flow: [], funding_rate: [] }); const seriesLoading = ref(false); const seriesError = ref('');
        const priceChartEl = ref(null); const openInterestChartEl = ref(null); const flowChartEl = ref(null); const fundingChartEl = ref(null); const symbolSearchEl = ref(null); const charts = [];
        const summary = computed(() => detail.value?.summary || {});
        const filteredSymbols = computed(() => { const query = symbolQuery.value.trim().toUpperCase(); return symbolOptions.value.filter(item => !query || item.includes(query)).slice(0, 100); });
        const statusText = computed(() => ({ complete: '数据完整', partial: '部分数据', empty: '暂无数据' }[detail.value?.data_status] || '状态未知'));
        const missingExchangeDetails = computed(() => {
          const missing = new Set((detail.value?.missing_exchanges || []).map(item => String(item).toLowerCase()));
          if (!missing.size) return '';
          const labels = {
            unsupported_symbol: '不支持该合约', unsupported_exchange: '未启用',
            missing_open_interest_history: '缺少持仓历史', missing_kline_history: '缺少价格历史',
            missing_open_interest_target: '缺少持仓数据', missing_kline_target: '缺少价格数据',
            missing_exchange_anchor: '当前快照未对齐',
          };
          const rows = detail.value?.exchange_distribution || [];
          return [...missing].map(exchange => {
            const item = rows.find(row => String(row.exchange).toLowerCase() === exchange);
            if (item?.status === 'unsupported') return `${exchange}（不支持该合约）`;
            const reasons = Array.isArray(item?.reason) ? item.reason : [];
            const reasonText = [...new Set(reasons.map(reason => labels[reason?.reason] || reason?.reason).filter(Boolean))].slice(0, 2).join('、');
            return `${exchange}（${reasonText || '数据不完整'}）`;
          }).join('、');
        });
        const scoreValue = computed(() => structureScore.value?.total_score == null ? 'N/A' : Number(structureScore.value.total_score).toFixed(1));
        const scoreDescription = computed(() => structureScore.value?.operation_advice || structureScore.value?.trade_signal || '暂无评分');
        const scoreComponents = computed(() => { const score = structureScore.value || {}; return [{ key:'trend', label:'趋势', value:score.trend_score, description:score.trend_direction }, { key:'momentum', label:'动量', value:score.momentum_score, description:score.momentum_direction }, { key:'position', label:'仓位', value:score.position_score, description:score.position_structure }, { key:'sentiment', label:'情绪', value:score.sentiment_score, description:score.sentiment_state }, { key:'risk', label:'风险', value:score.risk_score, description:score.risk_level }]; });
        const hasMarketSeries = computed(() => series.value.market?.length); const hasFlowSeries = computed(() => series.value.flow?.length); const hasFundingSeries = computed(() => series.value.funding_rate?.length);
        const formatTime = value => value ? new Date(value).toLocaleString('zh-CN', { hour12: false }) : '未知';
        const tone = value => value == null || Number(value) === 0 ? '' : Number(value) > 0 ? 'positive' : 'negative';
        const formatPercent = (value, signed = true) => value == null ? 'N/A' : `${signed && Number(value) > 0 ? '+' : ''}${Number(value).toFixed(2)}%`;
        const formatRate = value => value == null ? 'N/A' : `${(Number(value) * 100).toFixed(4)}%`;
        const formatScore = value => value == null ? 'N/A' : Number(value).toFixed(1);
        const formatPrice = value => value == null ? 'N/A' : `$${Number(value).toLocaleString('en-US', { maximumFractionDigits: 8 })}`;
        const formatCompact = (value, prefix = '') => { if (value == null) return 'N/A'; const number = Number(value); const abs = Math.abs(number); const units = [[1e9, 'B'], [1e6, 'M'], [1e3, 'K']]; const unit = units.find(([limit]) => abs >= limit); return unit ? `${prefix}${(number / unit[0]).toFixed(2)}${unit[1]}` : `${prefix}${number.toFixed(2)}`; };
        const formatSignedCompact = (value, prefix = '') => value == null ? 'N/A' : `${Number(value) > 0 ? '+' : Number(value) < 0 ? '-' : ''}${formatCompact(Math.abs(Number(value)), prefix)}`;
        const formatSignedPrice = value => value == null ? 'N/A' : `${Number(value) > 0 ? '+' : Number(value) < 0 ? '-' : ''}${formatPrice(Math.abs(Number(value)))}`;
        const chartCompact = value => formatCompact(value).replace(/\.00(?=[KMB]?$)/, '');
        const chartMoney = value => value == null ? 'N/A' : `${Number(value) < 0 ? '-' : ''}$${chartCompact(Math.abs(Number(value)))}`;
        let chartSyncGroup = null;
        const chartBase = {
          animation: false,
          backgroundColor: 'transparent',
          textStyle: { color: '#a1a1aa' },
          tooltip: { trigger: 'axis', axisPointer: { type: 'cross' } },
          grid: { left: 12, right: 12, top: 34, bottom: 68, containLabel: true },
          xAxis: { type: 'time', axisLabel: { color: '#71717a', margin: 12 } },
          legend: { bottom: 4, textStyle: { color: '#a1a1aa' } },
        };
        const disposeCharts = () => { if (chartSyncGroup) { echarts.disconnect(chartSyncGroup); chartSyncGroup = null; } while (charts.length) charts.pop().dispose(); };
        const makeChart = (el, option) => { if (!el || el.clientWidth === 0) return; const chart = echarts.init(el); chart.resize(); chart.setOption({ ...chartBase, ...option }, true); charts.push(chart); };
        const syncChartPointers = () => { if (charts.length > 1) chartSyncGroup = echarts.connect(charts); };
        const renderCharts = () => { disposeCharts(); if (hasMarketSeries.value) { makeChart(priceChartEl.value, { yAxis:[{type:'value',scale:true,axisLabel:{formatter:value=>chartMoney(value)}},{type:'value',scale:true,axisLabel:{formatter:value=>chartCompact(value)}}], series:[{name:'价格',type:'line',showSymbol:false,tooltip:{valueFormatter:value=>formatPrice(value)},data:series.value.market.map(x=>[x.time,x.price])},{name:'成交量',type:'bar',yAxisIndex:1,tooltip:{valueFormatter:value=>chartCompact(value)},data:series.value.market.map(x=>[x.time,x.volume])}] }); makeChart(openInterestChartEl.value, { yAxis:[{type:'value',scale:true,axisLabel:{formatter:value=>chartMoney(value)}},{type:'value',scale:true,axisLabel:{formatter:value=>chartCompact(value)}}], series:[{name:'持仓价值',type:'line',showSymbol:false,tooltip:{valueFormatter:value=>chartMoney(value)},data:series.value.market.map(x=>[x.time,x.open_interest_value])},{name:'持仓量',type:'line',showSymbol:false,yAxisIndex:1,tooltip:{valueFormatter:value=>chartCompact(value)},data:series.value.market.map(x=>[x.time,x.open_interest])}] }); } if (hasFlowSeries.value) makeChart(flowChartEl.value, { yAxis:{type:'value',scale:true,axisLabel:{formatter:value=>chartCompact(value)}}, series:[{name:'主动买入',type:'line',showSymbol:false,lineStyle:{color:'#4ade80'},itemStyle:{color:'#4ade80'},tooltip:{valueFormatter:value=>chartCompact(value)},data:series.value.flow.map(x=>[x.time,x.buy_volume])},{name:'主动卖出',type:'line',showSymbol:false,lineStyle:{color:'#f87171'},itemStyle:{color:'#f87171'},tooltip:{valueFormatter:value=>chartCompact(value)},data:series.value.flow.map(x=>[x.time,x.sell_volume])},{name:'净流入',type:'bar',tooltip:{valueFormatter:value=>chartCompact(value)},data:series.value.flow.map(x=>({value:[x.time,x.net_inflow],itemStyle:{color:x.net_inflow >= 0 ? '#4ade80' : '#f87171'}}))}] }); if (hasFundingSeries.value) makeChart(fundingChartEl.value, { visualMap:{show:false,dimension:1,seriesIndex:[0],pieces:[{gt:0,color:'#4ade80'},{lt:0,color:'#f87171'},{value:0,color:'#a1a1aa'}]}, yAxis:{type:'value',scale:true,axisLabel:{formatter:v=>(v*100).toFixed(3)+'%'}}, series:[{name:'结算费率',type:'line',showSymbol:false,tooltip:{valueFormatter:value=>formatRate(value)},data:series.value.funding_rate.map(x=>[x.time,x.funding_rate])}] }); syncChartPointers(); };
        const loadSeries = async () => { const requestedSymbol = symbol.value; const requestedRange = selectedRange.value; seriesLoading.value = true; seriesError.value = ''; disposeCharts(); try { const response = await fetch(`/api/coin-detail/${encodeURIComponent(requestedSymbol)}/series?range=${requestedRange}`); const result = await response.json(); if (!response.ok || result.status !== 'success') throw new Error(result.message || '加载失败'); if (requestedSymbol !== symbol.value || requestedRange !== selectedRange.value) return; series.value = result.data; } catch(err) { if (requestedSymbol !== symbol.value || requestedRange !== selectedRange.value) return; seriesError.value = `趋势加载失败：${err.message}`; series.value = {market:[],flow:[],funding_rate:[]}; } finally { if (requestedSymbol === symbol.value && requestedRange === selectedRange.value) { seriesLoading.value = false; await nextTick(); renderCharts(); } } };
        const changeRange = value => { selectedRange.value = value; loadSeries(); };
        const loadStructureScore = async () => { const requestedSymbol = symbol.value; scoreLoading.value = true; scoreError.value = ''; try { const response = await fetch(`/api/coin-detail/${encodeURIComponent(requestedSymbol)}/structure-score`); const result = await response.json(); if (!response.ok || result.status !== 'success') throw new Error(result.message || '加载失败'); if (requestedSymbol !== symbol.value) return; structureScore.value = result.data?.structure_score || null; structureScoreAsOf.value = result.data?.as_of || null; } catch(err) { if (requestedSymbol !== symbol.value) return; scoreError.value = `结构评分加载失败：${err.message}`; } finally { if (requestedSymbol === symbol.value) scoreLoading.value = false; } };
        const isValidSymbol = value => /^[A-Z0-9_-]{2,50}$/.test(value);
        const readRecentSymbols = () => { try { const saved = JSON.parse(localStorage.getItem('coinx.contract-detail.recent') || '[]'); recentSymbols.value = Array.isArray(saved) ? saved.map(item => typeof item === 'string' ? item.trim().toUpperCase() : '').filter(isValidSymbol).slice(0, 10) : []; } catch (_) { recentSymbols.value = []; } };
        const recordRecentSymbol = value => { const normalized = value.trim().toUpperCase(); recentSymbols.value = [normalized, ...recentSymbols.value.filter(item => item !== normalized)].slice(0, 10); try { localStorage.setItem('coinx.contract-detail.recent', JSON.stringify(recentSymbols.value)); } catch (_) {} };
        const loadSymbolOptions = async () => { try { const response = await fetch('/api/coins-config'); const result = await response.json(); if (!response.ok || result.status !== 'success') return; const symbols = Object.keys(result.data || {}).map(item => item.trim().toUpperCase()).filter(isValidSymbol); symbolOptions.value = [...new Set([...symbols, ...recentSymbols.value])].sort(); } catch (_) {} };
        const resetDetailState = () => { detail.value = null; structureScore.value = null; structureScoreAsOf.value = null; series.value = { market: [], flow: [], funding_rate: [] }; seriesError.value = ''; scoreError.value = ''; disposeCharts(); };
        const switchSymbol = value => { const normalized = (value || '').trim().toUpperCase(); if (!normalized || normalized === symbol.value) { showSymbolMenu.value = false; return; } symbol.value = normalized; selectionRequired.value = false; symbolQuery.value = ''; showSymbolMenu.value = false; resetDetailState(); history.pushState({}, '', `/coin-detail?symbol=${encodeURIComponent(normalized)}`); loadData(); loadStructureScore(); loadSeries(); };
        const selectFirstSymbol = () => { if (filteredSymbols.value.length) switchSymbol(filteredSymbols.value[0]); };
        const toggleSymbolMenu = async () => { showSymbolMenu.value = !showSymbolMenu.value; if (showSymbolMenu.value) { await nextTick(); symbolSearchEl.value?.focus(); } };
        const closeSymbolMenu = event => { if (!event.currentTarget.contains(event.relatedTarget)) showSymbolMenu.value = false; };
        const loadData = async () => { const requestedSymbol = symbol.value; if (!requestedSymbol) { selectionRequired.value = true; return; } loading.value = true; error.value = ''; try { const response = await fetch(`/api/coin-detail/${encodeURIComponent(requestedSymbol)}`); const result = await response.json(); if (!response.ok || result.status !== 'success') throw new Error(result.message || '加载失败'); if (requestedSymbol !== symbol.value) return; detail.value = result.data; recordRecentSymbol(requestedSymbol); await nextTick(); renderCharts(); } catch (err) { if (requestedSymbol !== symbol.value) return; error.value = err.message === 'contract detail not found' ? '暂无该合约的已存储数据' : `加载数据失败：${err.message}`; } finally { if (requestedSymbol === symbol.value) loading.value = false; } };
        const goBack = () => history.length > 1 ? history.back() : location.assign('/');
        onMounted(() => { readRecentSymbols(); loadSymbolOptions(); const requestedSymbol = (new URLSearchParams(location.search).get('symbol') || '').trim().toUpperCase(); symbol.value = requestedSymbol || recentSymbols.value[0] || ''; if (symbol.value) { if (!requestedSymbol) history.replaceState({}, '', `/coin-detail?symbol=${encodeURIComponent(symbol.value)}`); loadData(); loadStructureScore(); loadSeries(); } else { selectionRequired.value = true; } });
        const resize = () => charts.forEach(chart => chart.resize()); window.addEventListener('resize', resize); onBeforeUnmount(() => { window.removeEventListener('resize', resize); disposeCharts(); });
        return { symbol, symbolQuery, recentSymbols, showSymbolMenu, filteredSymbols, detail, loading, error, selectionRequired, summary, statusText, missingExchangeDetails, structureScore, structureScoreAsOf, scoreLoading, scoreError, scoreValue, scoreDescription, scoreComponents, ranges, selectedRange, series, seriesLoading, seriesError, priceChartEl, openInterestChartEl, flowChartEl, fundingChartEl, symbolSearchEl, hasMarketSeries, hasFlowSeries, hasFundingSeries, formatTime, tone, formatPercent, formatRate, formatScore, formatPrice, formatCompact, formatSignedCompact, formatSignedPrice, changeRange, loadData, loadStructureScore, switchSymbol, selectFirstSymbol, toggleSymbolMenu, closeSymbolMenu, goBack };
      }
    }).mount('#app');
  </script>
</body>
</html>
