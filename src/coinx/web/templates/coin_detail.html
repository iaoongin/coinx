<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>币种详情</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='dark-theme.css') }}">
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='brand/coinx-mark.svg') }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <style>
    body {
      margin: 0;
      padding: var(--page-padding);
      font-family: 'Noto Sans SC', sans-serif;
    }

    #app { max-width: var(--page-max-width); margin: 20px auto; }

    .shell {
      background: var(--bg-card);
      border: 1px solid var(--border-default);
      border-radius: var(--card-radius-lg);
      box-shadow: var(--shadow-card);
      padding: 20px;
      margin-bottom: 20px;
      animation: fadeInUp 0.5s ease;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border-subtle);
    }

    .header h1 {
      margin: 0;
      font-size: 22px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .header h1 span {
      color: var(--gold-primary);
      font-family: var(--font-mono);
    }

    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all var(--transition-fast);
      background: var(--bg-elevated);
      color: var(--text-secondary);
      border: 1px solid var(--border-default);
    }

    .btn:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }

    .positive { color: var(--positive) !important; font-weight: 600; font-family: var(--font-mono); }
    .negative { color: var(--negative) !important; font-weight: 600; font-family: var(--font-mono); }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .info-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-default);
      border-radius: var(--card-radius);
      padding: 18px;
    }

    .info-card h3 {
      margin: 0 0 14px;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      border-bottom: 1px solid var(--border-subtle);
      padding-bottom: 10px;
    }

    .price-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .price-row span:first-child {
      color: var(--text-muted);
      font-size: 13px;
    }

    .price-value {
      font-size: 20px;
      font-weight: 600;
      font-family: var(--font-mono);
      color: var(--text-primary);
    }

    .funding-rate {
      font-size: 16px;
      font-weight: 600;
      font-family: var(--font-mono);
      color: var(--gold-primary);
    }

    .total-oi {
      text-align: center;
      font-size: 18px;
      font-weight: 600;
      font-family: var(--font-mono);
      color: var(--text-primary);
      margin-bottom: 16px;
    }

    .oi-changes {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
      gap: 8px;
    }

    .oi-item {
      text-align: center;
      padding: 10px;
      background: var(--bg-card);
      border-radius: 6px;
      border: 1px solid var(--border-subtle);
    }

    .oi-label {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .oi-value {
      font-size: 13px;
      font-weight: 500;
      font-family: var(--font-mono);
      color: var(--text-secondary);
    }

    .exchange-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .exchange-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--border-subtle);
    }

    .exchange-item:last-child {
      border-bottom: none;
    }

    .exchange-name {
      font-weight: 500;
      color: var(--text-primary);
    }

    .exchange-value {
      font-weight: 600;
      font-family: var(--font-mono);
      color: var(--gold-primary);
    }

    .exchange-percentage {
      font-size: 11px;
      color: var(--text-muted);
      margin-left: 4px;
    }

    .time-series {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
      gap: 8px;
    }

    .time-item {
      text-align: center;
      padding: 10px;
      background: var(--bg-card);
      border-radius: 6px;
      border: 1px solid var(--border-subtle);
    }

    .time-label {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .time-value {
      font-size: 13px;
      font-weight: 600;
      font-family: var(--font-mono);
    }

    .loading-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
      font-size: 14px;
    }

    .error-state {
      padding: 16px;
      background: var(--negative-dim);
      border: 1px solid rgba(248, 113, 113, 0.2);
      border-radius: 8px;
      color: var(--negative);
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="app">
    {% include 'components/nav.html' %}

    <div class="shell">
      <div class="header">
        <h1><span>CoinX</span> {{ symbol }} 合约详情</h1>
        <button class="btn" @click="goBack">← 返回</button>
      </div>

      <div class="loading-state" v-if="loading">正在加载数据...</div>
      <div class="error-state" v-else-if="error">{{ error }}</div>

      <template v-else-if="data">
{% raw %}
        <div class="info-grid">
          <div class="info-card">
            <h3>基础信息</h3>
            <div class="price-row">
              <span>最近交易价</span>
              <span class="price-value">{{ formatPrice(data.latest_price) }}</span>
            </div>
            <div class="price-row">
              <span>资金费率</span>
              <span class="funding-rate">{{ formatFundingRate() }}</span>
            </div>
            <div class="price-row" v-if="data.ticker_data">
              <span>24h涨跌</span>
              <span :class="data.ticker_data.priceChangePercent >= 0 ? 'positive' : 'negative'">
                {{ formatPercentage(data.ticker_data.priceChangePercent) }}
              </span>
            </div>
          </div>

          <div class="info-card">
            <h3>持仓信息</h3>
            <div class="total-oi" v-if="data.open_interest_data">
              总持仓: {{ formatNumber(data.open_interest_data.openInterestValue) }}
            </div>
            <div class="oi-changes">
              <div class="oi-item" v-for="interval in intervals" :key="interval">
                <div class="oi-label">{{ interval }}</div>
                <div class="oi-value">{{ formatNumber(data.open_interest_data?.openInterestValue || 0) }}</div>
                <div class="oi-label" :class="getIntervalChange(interval).includes('-') ? 'negative' : 'positive'">{{ getIntervalChange(interval) }}</div>
              </div>
            </div>
          </div>

          <div class="info-card">
            <h3>交易所持仓分布</h3>
            <ul class="exchange-list">
              <li class="exchange-item" v-for="(info, exchange) in data.exchange_distribution" :key="exchange">
                <span class="exchange-name">{{ formatExchangeName(exchange) }}</span>
                <span class="exchange-value">
                  {{ formatNumber(info.value) }}
                  <span class="exchange-percentage">({{ info.percentage }}%)</span>
                </span>
              </li>
            </ul>
          </div>

          <div class="info-card">
            <h3>主力净流入</h3>
            <div class="time-series">
              <div class="time-item" v-for="(value, time) in data.net_inflow_data" :key="time">
                <div class="time-label">{{ time }}</div>
                <div class="time-value" :class="value >= 0 ? 'positive' : 'negative'">
                  {{ formatNumber(value) }}
                </div>
              </div>
            </div>
          </div>
        </div>
{% endraw %}
      </template>
    </div>
  </div>

  <script>
    const { createApp, ref, reactive, computed, onMounted } = Vue;

    const App = {
      setup() {
        const symbol = ref('');
        const data = ref(null);
        const loading = ref(true);
        const error = ref('');
        const intervals = ref(['5m', '15m', '30m', '1h', '4h', '8h', '12h', '24h', '72h', '168h']);

        const activeMenu = computed(() => '/coin-detail');
        const intervalChanges = {
          '5m': '+0.26%', '15m': '+0.13%', '30m': '-0.20%',
          '1h': '-2.28%', '4h': '-4.96%', '8h': '-1.36%',
          '12h': '-3.41%', '24h': '+26.82%', '72h': '+57.17%', '168h': '+147.93%'
        };

        const getSymbolFromUrl = () => {
          const urlParams = new URLSearchParams(window.location.search);
          return urlParams.get('symbol') || 'SPKUSDT';
        };

        const formatNumber = (num) => {
          if (num === null || num === undefined) return 'N/A';
          const absNum = Math.abs(num);
          if (absNum >= 1e9) return (num / 1e9).toFixed(2) + 'B';
          if (absNum >= 1e6) return (num / 1e6).toFixed(2) + 'M';
          if (absNum >= 1e3) return (num / 1e3).toFixed(2) + 'K';
          return num.toFixed(2);
        };

        const formatPrice = (price) => {
          if (price === null || price === undefined) return 'N/A';
          return '$' + price.toFixed(8);
        };

        const formatPercentage = (percent) => {
          if (percent === null || percent === undefined) return 'N/A';
          return (percent > 0 ? '+' : '') + percent.toFixed(2) + '%';
        };

        const formatFundingRate = () => {
          if (!data.value?.funding_rate) return 'N/A';
          return formatPercentage(data.value.funding_rate.lastFundingRate * 100);
        };

        const formatExchangeName = (exchange) => {
          return exchange.charAt(0).toUpperCase() + exchange.slice(1);
        };

        const getIntervalChange = (interval) => {
          return intervalChanges[interval] || 'N/A';
        };

        const goBack = () => {
          window.history.back();
        };

        const loadData = async () => {
          symbol.value = getSymbolFromUrl();
          loading.value = true;
          error.value = '';

          try {
            const response = await fetch(`/api/coin-detail/${symbol.value}`);
            const result = await response.json();
            if (result.status === 'success') {
              data.value = result.data;
            } else {
              error.value = result.message;
            }
          } catch (err) {
            error.value = '加载数据失败: ' + err.message;
          } finally {
            loading.value = false;
          }
        };

        onMounted(() => {
          loadData();
        });

        const handleMenuSelect = (index) => {
          window.location.href = index;
        };

        return {
          symbol,
          data,
          loading,
          error,
          intervals,
          activeMenu,
          handleMenuSelect,
          formatNumber,
          formatPrice,
          formatPercentage,
          formatFundingRate,
          formatExchangeName,
          getIntervalChange,
          goBack
        };
      }
    };

    const app = createApp(App);
    app.mount('#app');
  </script>
</body>
</html>
