<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CoinX 登录</title>
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='brand/coinx-mark.svg') }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0a0e17;
      --bg-card: #151c28;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --border-default: rgba(255, 255, 255, 0.1);
      --accent: #00d4aa;
      --accent-hover: #00b894;
      --error-bg: rgba(239, 68, 68, 0.12);
      --error-text: #ef4444;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: 'Noto Sans SC', 'PingFang SC', sans-serif;
      color: var(--text-primary);
      background: var(--bg-primary);
    }

    .panel {
      width: 100%;
      max-width: 380px;
      padding: 32px 28px;
      border-radius: 16px;
      background: var(--bg-card);
      border: 1px solid var(--border-default);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 600;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    h1 span {
      color: var(--accent);
    }

    .login-brand-mark {
      width: 34px;
      height: 34px;
      display: block;
      border-radius: 10px;
      box-shadow: 0 10px 24px rgba(0, 212, 170, 0.18);
    }

    .subtitle {
      margin: 0 0 24px;
      color: var(--text-muted);
      font-size: 13px;
      line-height: 1.5;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border-default);
      border-radius: 8px;
      font-size: 14px;
      color: var(--text-primary);
      background: var(--bg-primary);
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0, 212, 170, 0.15);
    }

    input::placeholder {
      color: var(--text-muted);
    }

    .error {
      margin: 14px 0 0;
      padding: 12px 14px;
      border-radius: 8px;
      background: var(--error-bg);
      color: var(--error-text);
      font-size: 13px;
    }

    button {
      width: 100%;
      margin-top: 20px;
      padding: 12px 16px;
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: var(--bg-primary);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.18s ease, background 0.18s ease;
    }

    button:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
    }
  </style>
</head>
<body>
  <main class="panel">
    <h1>
      <img
        class="login-brand-mark"
        src="{{ url_for('static', filename='brand/coinx-mark.svg') }}"
        alt="CoinX logo"
        width="34"
        height="34"
      >
      <span>CoinX</span>
    </h1>
    <p class="subtitle">网页服务已启用登录保护，请输入用户名和密码继续。</p>
    <form method="post" action="{{ url_for('auth.login') }}">
      <input type="hidden" name="next" value="{{ next_target }}" />
      <label for="username">用户名</label>
      <input id="username" name="username" type="text" autocomplete="username" required />
      <label for="password">访问密码</label>
      <input id="password" name="password" type="password" autocomplete="current-password" autofocus required />
      {% if error_message %}
      <div class="error">{{ error_message }}</div>
      {% endif %}
      <button type="submit">登录</button>
    </form>
  </main>
</body>
</html>
