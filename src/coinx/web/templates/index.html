<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>币种数据监控</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://unpkg.com/element-plus/dist/index.full.js"></script>
  <style>
    body { font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: var(--page-padding); background: var(--page-bg-gradient); font-size: 14px; color: #333; }
    #app { max-width: var(--page-max-width); margin: 0 auto; }
    .container { background-color: var(--page-surface-bg); padding: var(--page-surface-padding); border-radius: var(--page-surface-radius); box-shadow: var(--page-surface-shadow); }
    h1 { color: #2c3e50; font-size: 28px; margin: 0; font-weight: 600; }
    .header-row { display: flex; justify-content: space-between; align-items: center; gap: 16px; margin-bottom: 20px; padding: 0 0 15px; border-bottom: 1px solid #ecf0f1; }
    .right-header-section { display: flex; align-items: center; gap: 15px; }
    .time-info { display: flex; flex-direction: column; align-items: flex-end; text-align: right; font-size: 13px; color: #7f8c8d; }
    .positive { color: #27ae60; font-weight: 600; }
    .negative { color: #e74c3c; font-weight: 600; }
    .table-wrapper { margin-top: 25px; border-radius: 12px; overflow-x: auto; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08); background: white; }
    table { width: 100%; border-collapse: separate; border-spacing: 0; }
    thead { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    th { background: transparent; padding: 16px 14px; text-align: center; font-size: 12px; font-weight: 700; color: #f8fafc; border: none; white-space: nowrap; text-shadow: 0 1px 1px rgba(15, 23, 42, 0.28); }
    th:first-child { text-align: left; padding-left: 20px; }
    td { padding: 12px 8px; text-align: center; font-size: 13px; color: #4b5563; border-bottom: 1px solid #f3f4f6; vertical-align: middle; }
    td.symbol-cell { text-align: left; padding-left: 20px; font-weight: 600; color: #667eea; border-right: 2px solid #e5e7eb; }
    td.type-cell { color: #6b7280; font-size: 12px; }
    td.change-cell { font-size: 12px; }
    td .ratio { font-weight: 600; margin-bottom: 2px; }
    td .value { font-size: 11px; color: #6b7280; }
    tbody tr:nth-child(6n+2) td, tbody tr:nth-child(6n+3) td, tbody tr:nth-child(6n+4) td { background: #f9fafb; }
    tbody tr:hover td { background-color: #eef2ff !important; }
    .coin-link { color: #667eea; text-decoration: none; font-weight: 600; }
    .coin-link:hover { text-decoration: underline; }
    .countdown { font-weight: bold; color: #e74c3c; }
    .btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; }
    .btn-primary { background: linear-gradient(135deg, #3498db, #2980b9); color: white; }
    .btn-success { background: linear-gradient(135deg, #4caf50, #45a049); color: white; }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
    @media (max-width: 768px) {
      .header-row { align-items: flex-start; }
      .right-header-section { flex-direction: column; align-items: flex-end; }
    }
  </style>
</head>
<body>
  <div id="app">
    {% include 'components/nav.html' %}
    
    <div class="container">
{% raw %}
      <div class="header-row">
        <h1>币种数据监控</h1>
        <div class="right-header-section">
          <div class="time-info">
            <div>最后更新时间: {{ lastUpdateTime || '--' }}</div>
            <div>下次刷新倒计时: <span class="countdown">{{ countdown }}</span></div>
          </div>
          <button class="btn btn-primary" @click="loadData(true)">↻ 刷新</button>
        </div>
      </div>

      <div class="table-wrapper" v-if="tableData.length > 0">
        <table>
          <thead>
            <tr>
              <th style="position: sticky; left: 0; z-index: 20;">币种</th>
              <th>类型</th>
              <th>当前</th>
              <th v-for="interval in intervals" :key="interval">{{ interval }}</th>
            </tr>
          </thead>
          <tbody>
            <template v-for="(coin, index) in tableData" :key="coin.symbol">
              <!-- 持仓量行 -->
              <tr>
                <td :rowspan="4" class="symbol-cell">
                  <a :href="`/coin-detail?symbol=${coin.symbol}`" class="coin-link">{{ coin.symbol }}</a>
                </td>
                <td class="type-cell">持仓量</td>
                <td>{{ coin.current_open_interest_formatted || 'N/A' }}</td>
                <td v-for="change in getChangesForType(coin, 'ratio')" :key="change.interval" class="change-cell">
                  <div class="ratio" :class="getChangeClass(change.ratio)">{{ formatChange(change.ratio) }}</div>
                  <div class="value">{{ change.open_interest_formatted || 'N/A' }}</div>
                </td>
              </tr>
              <!-- 持仓价值行 -->
              <tr>
                <td class="type-cell">持仓价值</td>
                <td>{{ coin.current_open_interest_value_formatted || 'N/A' }}</td>
                <td v-for="change in getChangesForType(coin, 'value_ratio')" :key="change.interval" class="change-cell">
                  <div class="ratio" :class="getChangeClass(change.value_ratio)">{{ formatChange(change.value_ratio) }}</div>
                  <div class="value">{{ change.open_interest_value_formatted || 'N/A' }}</div>
                </td>
              </tr>
              <!-- 价格行 -->
              <tr>
                <td class="type-cell">价格</td>
                <td>{{ coin.current_price_formatted || 'N/A' }}</td>
                <td v-for="change in getChangesForType(coin, 'price_change')" :key="change.interval" class="change-cell">
                  <div class="ratio" :class="getChangeClass(change.price_change_percent)">{{ formatChange(change.price_change_percent) }}</div>
                  <div class="value">{{ change.current_price_formatted || 'N/A' }}</div>
                </td>
              </tr>
              <!-- 主力净流入行 -->
              <tr>
                <td class="type-cell">主力净流入</td>
                <td :class="getNetInflowClass(coin.net_inflow?.['5m'])">{{ formatNetInflow(coin.net_inflow?.['5m']) }}</td>
                <td v-for="interval in intervals" :key="interval" :class="getNetInflowClass(coin.net_inflow?.[interval])">
                  {{ formatNetInflow(coin.net_inflow?.[interval]) }}
                </td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>

      <div v-else-if="!loading" class="no-data">暂无数据</div>
      <div v-else class="loading">加载中...</div>
{% endraw %}
    </div>
  </div>

  <script>
    const { createApp, ref, onMounted, onUnmounted } = Vue;

    const App = {
      setup() {
        const tableData = ref([]);
        const loading = ref(false);
        const lastUpdateTime = ref('');
        const countdown = ref('--');
        const intervals = ref([]);

        let countdownInterval = null;

        const formatNetInflow = (value) => {
          if (typeof value !== 'number') return 'N/A';
          const abs = Math.abs(value);
          if (abs >= 1e6) return (value / 1e6).toFixed(2) + 'M';
          if (abs >= 1e3) return (value / 1e3).toFixed(2) + 'K';
          return value.toFixed(0);
        };

        const getNetInflowClass = (value) => {
          if (typeof value !== 'number') return '';
          return value > 0 ? 'positive' : value < 0 ? 'negative' : '';
        };

        const formatChange = (value) => {
          if (value === null || value === undefined) return 'N/A';
          return (value > 0 ? '+' : '') + value.toFixed(2) + '%';
        };

        const getChangeClass = (value) => {
          if (value === null || value === undefined) return '';
          return value > 0 ? 'positive' : value < 0 ? 'negative' : '';
        };

        const getChangesForType = (coin, type) => {
          if (!coin.changes || !Array.isArray(coin.changes)) return [];
          return coin.changes.map(c => ({ ...c, type }));
        };

        const updateCountdown = () => {
          const now = new Date();
          const nextRefreshTime = new Date(now);
          nextRefreshTime.setMinutes(Math.ceil(nextRefreshTime.getMinutes() / 5) * 5);
          nextRefreshTime.setSeconds(0);
          nextRefreshTime.setMilliseconds(0);
          
          if (nextRefreshTime <= now) {
            nextRefreshTime.setTime(nextRefreshTime.getTime() + 5 * 60 * 1000);
          }

          const timeDiff = nextRefreshTime - now;
          if (timeDiff <= 0) {
            loadData();
            return;
          }

          const seconds = Math.floor(timeDiff / 1000);
          const minutes = Math.floor(seconds / 60);
          const secs = seconds % 60;
          countdown.value = `${minutes}:${secs.toString().padStart(2, '0')}`;
        };

        const startCountdown = () => {
          if (countdownInterval) clearInterval(countdownInterval);
          updateCountdown();
          countdownInterval = setInterval(updateCountdown, 1000);
        };

        const loadData = async (force = false) => {
          loading.value = true;
          try {
            const response = await fetch(force ? '/api/update?force=true' : '/api/update');
            await response.json();
            
            const dataResponse = await fetch('/api/coins');
            const result = await dataResponse.json();
            
            if (result.status === 'success') {
              tableData.value = result.data || [];
              if (result.data && result.data.length > 0 && result.data[0].changes) {
                intervals.value = result.data[0].changes.map(c => c.interval);
              }
              if (result.cache_update_time) {
                lastUpdateTime.value = new Date(result.cache_update_time).toLocaleString('zh-CN');
                startCountdown();
              }
            }
          } catch (error) {
            console.error('加载数据失败:', error);
          } finally {
            loading.value = false;
          }
        };

        onMounted(() => {
          loadData();
        });

        onUnmounted(() => {
          if (countdownInterval) clearInterval(countdownInterval);
        });

        return {
          tableData,
          loading,
          lastUpdateTime,
          countdown,
          intervals,
          formatNetInflow,
          getNetInflowClass,
          formatChange,
          getChangeClass,
          getChangesForType,
          loadData
        };
      }
    };

    const app = createApp(App);
    app.use(ElementPlus);
    app.mount('#app');
  </script>
</body>
</html>
