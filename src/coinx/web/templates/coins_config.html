<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>币种配置管理</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://unpkg.com/element-plus/dist/index.full.js"></script>
  <style>
    body { font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); font-size: 14px; color: #333; }
    #app { max-width: 1200px; margin: 0 auto; }
    .config-container { background-color: rgba(255, 255, 255, 0.95); padding: 25px; border-radius: var(--page-surface-radius); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2); min-height: 78vh; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid #ecf0f1; }
    .header h1 { margin: 0; color: #2c3e50; font-size: 28px; font-weight: 600; }
    @media (max-width: 768px) {
      .header { align-items: flex-start; gap: 12px; }
    }
  </style>
</head>
<body>
  <div id="app">
    {% include 'components/nav.html' %}
    
    <div class="config-container">
      <div class="header">
        <h1>币种配置管理</h1>
        <el-button type="success" @click="updateFromBinance" :loading="loading.updateBinance">
          从币安更新币种
        </el-button>
      </div>

      <el-transfer
        v-model="trackedCoins"
        :data="allCoinsData"
        :titles="['所有币种', '跟踪的币种']"
        :filterable="true"
        :filter-placeholder="筛选占位符"
        :left-default-checked="leftChecked"
        :right-default-checked="rightChecked"
        @change="handleTransferChange"
        @left-check-change="handleLeftCheckChange"
        @right-check-change="handleRightCheckChange"
      >
      </el-transfer>
    </div>
  </div>

  <script>
    const { createApp, ref, reactive, computed, onMounted } = Vue;
    const { ElMessage } = ElementPlus;

    const App = {
      setup() {
        const allCoinsData = ref([]);
        const trackedCoins = ref([]);
        const leftChecked = ref([]);
        const rightChecked = ref([]);
        const loading = reactive({
          updateBinance: false
        });
        const 筛选占位符 = ref('搜索币种...');
        
        const activeMenu = computed(() => '/coins-config');

        const loadCoinsConfig = async () => {
          try {
            const response = await fetch('/api/coins-config');
            const data = await response.json();
            
            if (data.status === 'success') {
              const coinsConfig = data.data;
              const allCoinsList = [];
              const trackedList = [];
              
              Object.entries(coinsConfig).forEach(([symbol, isTracked]) => {
                allCoinsList.push({ key: symbol, label: symbol });
                if (isTracked) {
                  trackedList.push(symbol);
                }
              });
              
              allCoinsData.value = allCoinsList;
              trackedCoins.value = trackedList;
            }
          } catch (error) {
            console.error('获取币种配置失败:', error);
            ElMessage.error('获取币种配置失败');
          }
        };

        const handleTransferChange = async (value, direction, movedKeys) => {
          if (direction === 'right') {
            const updates = movedKeys.map(symbol => ({ symbol, tracked: true }));
            await updateCoinsTracking(updates);
          } else if (direction === 'left') {
            const updates = movedKeys.map(symbol => ({ symbol, tracked: false }));
            await updateCoinsTracking(updates);
          }
        };

        const handleLeftCheckChange = (checked) => {
          leftChecked.value = checked;
        };

        const handleRightCheckChange = (checked) => {
          rightChecked.value = checked;
        };

        const updateCoinsTracking = async (updates) => {
          try {
            await Promise.all(
              updates.map(update =>
                fetch('/api/coins-config/track', {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify(update)
                }).then(res => res.json())
              )
            );
            ElMessage.success('更新成功');
            await loadCoinsConfig();
          } catch (error) {
            console.error('更新失败:', error);
            ElMessage.error('更新失败');
          }
        };

        const updateFromBinance = async () => {
          if (!confirm('确定要从币安获取最新币种列表吗？\n\n这将添加新上线的交易对到左侧列表（默认不跟踪），现有配置不受影响。')) {
            return;
          }
          
          loading.updateBinance = true;
          try {
            const response = await fetch('/api/coins-config/update-from-binance', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' }
            });
            const data = await response.json();
            
            if (data.status === 'success') {
              ElMessage.success(data.message || '币种配置更新成功');
              await loadCoinsConfig();
            } else {
              ElMessage.error(data.message || '币种配置更新失败');
            }
          } catch (error) {
            console.error('更新失败:', error);
            ElMessage.error('更新失败: ' + error.message);
          } finally {
            loading.updateBinance = false;
          }
        };

        onMounted(() => {
          loadCoinsConfig();
        });

        const handleMenuSelect = (index) => {
          window.location.href = index;
        };

        return {
          allCoinsData,
          trackedCoins,
          leftChecked,
          rightChecked,
          loading,
          筛选占位符,
          activeMenu,
          handleMenuSelect,
          handleTransferChange,
          handleLeftCheckChange,
          handleRightCheckChange,
          updateFromBinance
        };
      }
    };

    const app = createApp(App);
    app.use(ElementPlus);
    app.mount('#app');
  </script>
</body>
</html>
