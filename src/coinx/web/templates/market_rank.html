<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>行情榜</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://unpkg.com/element-plus/dist/index.full.js"></script>
  <style>
    body { font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); font-size: 14px; color: #333; }
    #app { max-width: 1200px; margin: 0 auto; }
    .container { background-color: rgba(255, 255, 255, 0.95); padding: 25px; border-radius: var(--page-surface-radius); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2); }
    h1 { color: #2c3e50; font-size: 28px; margin: 0; font-weight: 600; }
    .header-row { display: flex; justify-content: space-between; align-items: center; gap: 16px; margin-bottom: 20px; padding: 0 0 15px; border-bottom: 1px solid #ecf0f1; }
    .right-header-section { display: flex; align-items: center; gap: 15px; }
    .time-info { display: flex; flex-direction: column; align-items: flex-end; text-align: right; font-size: 13px; color: #7f8c8d; }
    .rank-type-selector { margin: 15px 0; display: flex; gap: 10px; align-items: center; }
    .rank-type-btn { padding: 8px 16px; border: 1px solid #ddd; background: #fff; color: #333; border-radius: 20px; cursor: pointer; font-size: 13px; transition: all 0.2s; }
    .rank-type-btn:hover { background: #f0f0f0; }
    .rank-type-btn.active { background: #e74c3c; color: #fff; border-color: #e74c3c; }
    .positive { color: #27ae60; font-weight: 600; }
    .negative { color: #e74c3c; font-weight: 600; }
    .table-wrapper { margin-top: 25px; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08); background: white; }
    .el-table {
      --el-table-header-bg-color: transparent;
      --el-table-border-color: transparent;
      --el-table-row-hover-bg-color: #eef2ff;
    }
    .el-table::before,
    .el-table__inner-wrapper::before {
      display: none;
    }
    .el-table__header-wrapper,
    .el-table__header-wrapper thead,
    .el-table__header thead,
    .el-table__header tr,
    thead {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .el-table__header-wrapper {
      overflow: hidden;
      border-top-left-radius: 12px;
      border-top-right-radius: 12px;
    }
    th,
    .el-table th.el-table__cell {
      background: transparent !important;
      padding: 16px 14px;
      text-align: center;
      font-size: 12px;
      font-weight: 700;
      color: #f8fafc !important;
      border: none;
      white-space: nowrap;
      text-shadow: 0 1px 1px rgba(15, 23, 42, 0.28);
    }
    .el-table th.el-table__cell > .cell {
      color: #f8fafc !important;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      white-space: nowrap;
      line-height: 1;
    }
    .el-table th.el-table__cell .caret-wrapper {
      margin-left: 0;
      flex: 0 0 auto;
    }
    .el-table th.el-table__cell.is-leaf {
      border-bottom: none;
    }
    td { padding: 14px; text-align: center; font-size: 14px; color: #4b5563; border-bottom: 1px solid #f3f4f6; }
    tbody tr:hover { background-color: #eef2ff; }
    .rank-badge { display: inline-block; width: 24px; height: 24px; line-height: 24px; text-align: center; border-radius: 50%; color: white; font-weight: bold; font-size: 12px; }
    .btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; }
    .btn-primary { background: linear-gradient(135deg, #3498db, #2980b9); color: white; }
    .btn-success { background: linear-gradient(135deg, #4caf50, #45a049); color: white; }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
    @media (max-width: 768px) {
      .header-row { align-items: flex-start; }
      .right-header-section { flex-direction: column; align-items: flex-end; }
    }
  </style>
</head>
<body>
  <div id="app">
    {% include 'components/nav.html' %}
    
    <div class="container">
{% raw %}
      <div class="header-row">
        <h1>行情榜</h1>
        <div class="right-header-section">
          <div class="time-info">
            <div>最后更新时间: {{ lastUpdateTime || '--' }}</div>
            <div>下次刷新倒计时: <span class="countdown">{{ countdown }}</span></div>
          </div>
          <el-button type="primary" @click="loadData(true)">↻ 刷新</el-button>
        </div>
      </div>

      <div class="rank-type-selector">
        <span style="font-weight: 600;">排行类型:</span>
        <button class="rank-type-btn" :class="{ active: currentRankType === 'price_change' && currentDirection === 'down' }" @click="changeRankType('price_change', 'down')">跌幅榜</button>
        <button class="rank-type-btn" :class="{ active: currentRankType === 'price_change' && currentDirection === 'up' }" @click="changeRankType('price_change', 'up')">涨幅榜</button>
        <button class="rank-type-btn" :class="{ active: currentRankType === 'quote_volume' }" @click="changeRankType('quote_volume', 'all')">成交额榜</button>
        <button class="rank-type-btn" :class="{ active: currentRankType === 'volume' }" @click="changeRankType('volume', 'all')">成交量榜</button>
      </div>

      <el-table :data="tableData" style="width: 100%" v-if="tableData.length > 0" :default-sort="{ prop: 'rankIndex', order: 'ascending' }">
        <el-table-column prop="rankIndex" label="排名" width="88" sortable align="center" header-align="center">
          <template #default="{ row, $index }">
            <span class="rank-badge" :style="{ backgroundColor: $index < 3 ? '#e74c3c' : '#bdc3c7' }">
              {{ row.rank_index || $index + 1 }}
            </span>
          </template>
        </el-table-column>
        <el-table-column prop="symbol" label="币种" min-width="96" sortable align="center" header-align="center">
          <template #default="{ row }">
            <strong><a :href="`/coin-detail?symbol=${row.symbol}`" style="color: #2c3e50; text-decoration: none;">{{ row.symbol }}</a></strong>
          </template>
        </el-table-column>
        <el-table-column prop="price" label="当前价格 (USDT)" width="168" sortable align="center" header-align="center">
          <template #default="{ row }">
            {{ formatPrice(row.price || row.current_price) }}
          </template>
        </el-table-column>
        <el-table-column prop="price_change_percent" label="24h 涨跌幅" width="128" sortable align="center" header-align="center">
          <template #default="{ row }">
            <span :class="row.price_change_percent >= 0 ? 'positive' : 'negative'">
              {{ formatChange(row.price_change_percent) }}
            </span>
          </template>
        </el-table-column>
        <el-table-column prop="volume" label="24h 成交量" width="136" sortable align="center" header-align="center">
          <template #default="{ row }">
            <span style="color: #7f8c8d;">{{ formatVolume(row.volume) }}</span>
          </template>
        </el-table-column>
        <el-table-column prop="quote_volume" label="24h 成交额 (USDT)" width="182" sortable align="center" header-align="center">
          <template #default="{ row }">
            <span style="color: #7f8c8d;">{{ formatVolume(row.quote_volume) }}</span>
          </template>
        </el-table-column>
      </el-table>

      <el-empty v-else-if="!loading" description="暂无数据"></el-empty>
      <el-skeleton v-else :rows="5" animated />
{% endraw %}
    </div>
  </div>

  <script>
    const { createApp, ref, onMounted, onUnmounted } = Vue;

    const App = {
      setup() {
        const tableData = ref([]);
        const loading = ref(false);
        const lastUpdateTime = ref('');
        const countdown = ref('--');
        const currentRankType = ref('price_change');
        const currentDirection = ref('down');

        let countdownInterval = null;

        const getApiUrl = () => {
          return `/api/market-rank?type=${currentRankType.value}&direction=${currentDirection.value}&limit=100`;
        };

        const formatPrice = (price) => {
          if (!price) return 'N/A';
          return parseFloat(price).toFixed(price < 1 ? 6 : 2);
        };

        const formatChange = (percent) => {
          if (percent === null || percent === undefined) return 'N/A';
          return (percent > 0 ? '+' : '') + parseFloat(percent).toFixed(2) + '%';
        };

        const formatVolume = (volume) => {
          if (!volume) return '0';
          if (volume >= 1e8) return (volume / 1e8).toFixed(2) + '亿';
          if (volume >= 1e4) return (volume / 1e4).toFixed(2) + '万';
          return parseFloat(volume).toFixed(2);
        };

        const updateCountdown = () => {
          const now = new Date();
          const nextRefreshTime = new Date(now);
          nextRefreshTime.setMinutes(Math.ceil(nextRefreshTime.getMinutes() / 5) * 5);
          nextRefreshTime.setSeconds(0);
          nextRefreshTime.setMilliseconds(0);
          
          if (nextRefreshTime <= now) {
            nextRefreshTime.setTime(nextRefreshTime.getTime() + 5 * 60 * 1000);
          }

          const timeDiff = nextRefreshTime - now;
          if (timeDiff <= 0) {
            loadData();
            return;
          }

          const seconds = Math.floor(timeDiff / 1000);
          const minutes = Math.floor(seconds / 60);
          const secs = seconds % 60;
          countdown.value = `${minutes}:${secs.toString().padStart(2, '0')}`;
        };

        const startCountdown = () => {
          if (countdownInterval) clearInterval(countdownInterval);
          updateCountdown();
          countdownInterval = setInterval(updateCountdown, 1000);
        };

        const loadData = async (force = false) => {
          loading.value = true;
          try {
            const response = await fetch(getApiUrl());
            const result = await response.json();
            
            if (result.status === 'success') {
              tableData.value = result.data || [];
              if (result.snapshot_time) {
                lastUpdateTime.value = new Date(result.snapshot_time).toLocaleString('zh-CN');
                startCountdown();
              }
            }
          } catch (error) {
            console.error('加载数据失败:', error);
          } finally {
            loading.value = false;
          }
        };

        const changeRankType = (type, direction) => {
          currentRankType.value = type;
          currentDirection.value = direction;
          loadData();
        };

        onMounted(() => {
          loadData();
        });

        onUnmounted(() => {
          if (countdownInterval) clearInterval(countdownInterval);
        });

        return {
          tableData,
          loading,
          lastUpdateTime,
          countdown,
          currentRankType,
          currentDirection,
          formatPrice,
          formatChange,
          formatVolume,
          loadData,
          changeRankType
        };
      }
    };

    const app = createApp(App);
    app.use(ElementPlus);
    app.mount('#app');
  </script>
</body>
</html>
