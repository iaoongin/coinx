server:
  host: 0.0.0.0
  port: 5000
  debug: false

profiles:
  active: dev

app:
  update_interval: 300
  time_intervals:
    - 5m
    - 15m
    - 30m
    - 1h
    - 4h
    - 12h
    - 24h
    - 48h
    - 72h
    - 168h
  binance_series:
    limit: 300
    types:
      - top_long_short_position_ratio
      - top_long_short_account_ratio
      - open_interest_hist
      - klines
      - global_long_short_account_ratio
    periods:
      - 5m
    repair:
      enabled: false
      interval: 900
      period: 5m
      bootstrap_days: 7
      coverage_hours: 168
      klines_page_limit: 1000
      futures_page_limit: 500
      sleep_ms: 500

database:
  host: localhost
  port: 3306
  username: root
  password: ""
  name: coinx
  charset: utf8mb4

proxy:
  enabled: false
  host: 127.0.0.1
  port: 7897

binance:
  base_url: https://proxy.yffjglcms.com/fapi.binance.com
